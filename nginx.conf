# nginx reverse-proxy config for the PRISM Risk Assessment Tool.
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/prism
#   sudo ln -s /etc/nginx/sites-available/prism /etc/nginx/sites-enabled/prism
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificate (run once, auto-renews):
#   sudo certbot --nginx -d your.domain
#
# Replace every occurrence of 'your.domain' below with your actual hostname.

# Rate-limit zone: 30 req/min per IP, 10 MB shared memory (~160k IPs).
# Flask-limiter provides a second layer inside the app (60/min per worker).
limit_req_zone $binary_remote_addr zone=prism:10m rate=30r/m;
limit_req_status 429;

server {
    listen 80;
    server_name your.domain;
    # Redirect all plain-HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your.domain;

    ssl_certificate     /etc/letsencrypt/live/your.domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain/privkey.pem;

    # Modern TLS only (drops IE11 / very old Android).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Tell the Flask app it's behind HTTPS so it sets HSTS.
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header Host              $host;

    location / {
        limit_req zone=prism burst=15 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Basic Auth happens inside Flask; nginx passes the header through.
        proxy_pass_header  Authorization;
    }

    # Block requests for hidden files (.env, .git, etc.).
    location ~ /\. {
        deny all;
    }
}
